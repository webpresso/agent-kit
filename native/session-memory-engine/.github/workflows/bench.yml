name: bench

on:
  pull_request:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  bench:
    name: criterion benchmarks + SLO gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88"

      - uses: Swatinem/rust-cache@v2

      - name: Run benchmarks
        run: cargo bench --package session-memory-core -- --output-format=json 2>/dev/null || cargo bench --package session-memory-core

      - name: Check SLO thresholds
        run: bash scripts/check-bench-thresholds.sh

      - name: Upload criterion artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: criterion-report
          path: target/criterion/
