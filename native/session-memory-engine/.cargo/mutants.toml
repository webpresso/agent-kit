# cargo-mutants configuration
# Config path: .cargo/mutants.toml (NOT .cargo-mutants.toml)

# Minimum mutation score threshold (enforced by scripts/check-mutation-score.sh)
# cargo-mutants itself has no built-in threshold flag — the script reads output/mutants.out/caught.txt etc.

# Packages to test
# (runs all by default — restrict if needed)
# packages = ["session-memory-core"]

# Timeout per mutant test run (seconds)
timeout_multiplier = 2.0

# Exclude generated or trivial code from mutation
exclude_items_re = ["fn fmt", "fn default"]

# Exclude test modules themselves
exclude_re = ["tests/"]
