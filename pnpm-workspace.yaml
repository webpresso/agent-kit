packages:
  - .
  - apps/*
  - packages/*

preferWorkspacePackages: true
enableGlobalVirtualStore: true
cleanupUnusedCatalogs: true

catalog:
  "@vitejs/plugin-react": ^6.0.3
  "@arethetypeswrong/cli": ^0.18.4
  "@types/node": ^26.0.1
  better-sqlite3: ^12.11.1
  publint: ^0.3.21
  tshy: ^4.1.3
  typescript: ^6.0.3
  vite: ^8.1.0
  vite-plus: ^0.2.1
  vitest: ^4.1.9

confirmModulesPurge: false
verifyDepsBeforeRun: warn

packageExtensions:
  # bun-types imports undici-types for non-DOM Fetch API fallbacks but does
  # not declare it. pnpm global virtual store uses stricter package realpaths,
  # so make the package edge explicit instead of relying on phantom hoisting.
  bun-types@*:
    dependencies:
      undici-types: ">=7.24.0 <7.24.7"

minimumReleaseAgeExclude:
  - "@webpresso/runtime-format"

allowBuilds:
  better-sqlite3: true
  esbuild: true
  sharp: true
  tldjs: true
  workerd: true

overrides:
  qs: 6.15.2
  esbuild: 0.28.1
  form-data: 4.0.6
  hono: 4.12.27
  undici: 7.28.0
  ws: 8.21.0
  gray-matter>js-yaml: 4.3.0
  read-yaml-file>js-yaml: 4.3.0

patchedDependencies:
  gray-matter@4.0.3: patches/gray-matter@4.0.3.patch
  read-yaml-file@1.1.0: patches/read-yaml-file@1.1.0.patch
