packages:
  - .
  - apps/*
  - packages/*

preferWorkspacePackages: true
cleanupUnusedCatalogs: true

catalog:
  '@arethetypeswrong/cli': ^0.18.3
  '@types/node': ^25.9.1
  publint: ^0.3.21
  typescript: ^6.0.3
  vite-plus: ^0.1.22
  vitest: ^4.1.7
  '@vitejs/plugin-react': ^6.0.2
  better-sqlite3: ^12.10.0
  tshy: ^4.1.2
  vite: ^8.0.14

confirmModulesPurge: false
verifyDepsBeforeRun: warn

minimumReleaseAgeExclude:
  - '@webpresso/runtime-format'

allowBuilds:
  better-sqlite3: true
  esbuild: true
  sharp: true
  tldjs: true
  workerd: true

overrides:
  qs: 6.15.2
  esbuild: 0.28.1
