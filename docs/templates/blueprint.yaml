name: blueprint
description: Blueprint template for features/initiatives

notes:
  - "This file describes the current preferred blueprint structure, not an immutable final schema."
  - "Repo-wide validity is determined by the live blueprint parser/audit rules, not by requiring every optional section below."
  - "Default creation shape: blueprints/<status>/<slug>.md. Folder-based blueprints remain valid at blueprints/<status>/<slug>/_overview.md when sibling docs are needed."

frontmatter:
  required:
    type:
      value: blueprint
      description: Must be exactly "blueprint"
    status:
      enum: [draft, planned, parked, in-progress, completed, archived]
      description: Current plan status (must match lifecycle placement)
    complexity:
      enum: [XS, S, M, L, XL]
      description: Estimated complexity
    last_updated:
      type: date
      format: YYYY-MM-DD
      description: Last modification date
  optional:
    parent_roadmap:
      type: string
      description: Local parent-roadmap slug/path in the same repo
    depends_on:
      type: array
      description: Local blueprint dependencies in the same repo
    cross_repo_depends_on:
      type: array
      description: Cross-repo blueprint dependencies expressed as { repo, slug, require_status? }

sections:
  required: []
  optional:
    - name: Planning Summary
      pattern: "^## Planning Summary"
      description: Execution framing, repo-specific constraints, and output path
    - name: Problem Statement
      pattern: "^## Problem Statement"
      description: Current repo reality and the gap this blueprint closes
    - name: Fact-Checked Findings
      pattern: "^## Fact-Checked Findings"
      description: Verified claims tied to concrete repo evidence
    - name: Evidence Base
      pattern: "^## Evidence Base"
      description: File paths and source anchors that support the plan
    - name: Architecture Overview
      pattern: "^## Architecture Overview"
      description: System boundary or flow diagram before task execution
    - name: Key Decisions
      pattern: "^## Key Decisions"
      description: Decision log with rationale
    - name: Quick Reference (Execution Waves)
      pattern: '^## Quick Reference \\(Execution Waves\\)'
      description: Parallel waves, dependencies, and effort sizing
    - name: Verification Gates
      pattern: "^## Verification Gates"
      description: Canonical commands and success criteria
    - name: Cross-Plan References
      pattern: "^## Cross-Plan References"
      description: Upstream/downstream blueprint relationships
    - name: Edge Cases and Error Handling
      pattern: "^## Edge Cases and Error Handling"
      description: Known edge cases and mitigation owners
    - name: Alternatives Considered
      pattern: "^## Alternatives Considered"
    - name: Risks
      pattern: "^## Risks"
    - name: Non-Goals
      pattern: "^## Non-Goals"
    - name: Technology Choices
      pattern: "^## Technology Choices"
      description: Versioned implementation choices and rationale
    - name: Completion Summary
      pattern: "^## Completion Summary"
      description: Required for completed blueprints
    - name: Retrospective
      pattern: "^## Retrospective"

location:
  patterns:
    - "blueprints/*/*.md"
    - "blueprints/*/*/_overview.md"
    - "blueprints/completed/*.md"
    - "blueprints/planned/*.md"
    - "blueprints/parked/*.md"
    - "blueprints/in-progress/*.md"
    - "blueprints/draft/*.md"

naming:
  pattern: "<slug>.md or _overview.md"
  case: exact
  notes: "Use <slug>.md by default. Use folder + _overview.md when the blueprint needs sibling markdown docs."

task_format:
  heading:
    canonical:
      - "#### [lane] Task X.Y: Title"
      - "#### Task X.Y: Title"
    notes:
      - "These are the current accepted task-heading forms enforced by the validator."
      - "Lane prefix is optional but recommended. Common lanes: [schema], [backend], [ui], [infra], [docs], [qa]."
  required_metadata:
    - "**Status:** todo|in-progress|blocked|done|dropped"
  notes:
    - "Task metadata rules here reflect the current validator contract."
    - "Acceptance checkboxes are evidence, not the lifecycle source of truth."
    - "Blocked tasks must include a non-empty **Blocked:** reason."
# Executable blueprints require a Trust Dossier before planned promotion.
