name: Harness Gate

on:
  pull_request:
    paths:
      - 'catalog/agent/harness-surfaces.yaml'
      - 'catalog/agent/harness-gate/**'
      - 'src/hooks/**'
      - 'src/symlinker/**'
      - 'scripts/bench/harness-gate/**'
      - '.github/workflows/harness-gate.yml'

jobs:
  verdict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '24.16.0'
          cache: pnpm
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest
      - run: pnpm install --frozen-lockfile
      - name: Produce planned-only harness gate verdict
        run: bun scripts/bench/harness-gate/index.ts --json --changed-file catalog/agent/harness-surfaces.yaml
