name: Harness Selection Gate (planned-only)

on:
  pull_request:
    paths:
      - "catalog/agent/harness-surfaces.yaml"
      - "catalog/agent/harness-gate/**"
      - "catalog/AGENTS.md.tpl"
      - "catalog/agent/agents/**"
      - "catalog/agent/rules/**"
      - "catalog/agent/skills/**"
      - "AGENTS.md"
      - "src/audit/**"
      - "src/secret-gate/**"
      - "src/cli/commands/secrets.ts"
      - "src/blueprint/execution/progress-bridge.ts"
      - "src/hooks/**"
      - "src/symlinker/**"
      - "scripts/bench/harness-gate/**"
      - ".github/workflows/**"

permissions:
  contents: read
  packages: read

jobs:
  verdict:
    name: Planned-only harness selection verdict
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "24.16.0"
          cache: pnpm
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest
      - run: pnpm install --frozen-lockfile
      - name: Produce planned-only harness selection verdict
        run: >-
          bun scripts/bench/harness-gate/index.ts --json
          --changed-files-from-git
          --base-ref origin/${{ github.base_ref }}
          --head-ref HEAD
