# Changesets-driven release workflow — publishes directly on push to main,
# no intermediate Version PR. Also creates a release/v<N> branch with
# compiled dist/ for marketplace consumers.
#
# Flow:
#   1. Contributor runs `pnpm changeset` on their branch and commits the file.
#   2. On merge to main, this workflow bumps versions, commits, publishes,
#      and creates the dist branch.
#
# To dry-run: gh workflow run release.yml -f dry-run=true

name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Skip publish (version bump only)"
        type: boolean
        required: false
        default: false

concurrency: ${{ github.workflow }}-${{ github.ref }}

env:
  # Opt the workflow's JavaScript actions into Node.js 24 ahead of the
  # 2026-06-02 GitHub default switch (replaces the deprecation warning
  # surfaced by actions/checkout@v4, actions/setup-node@v4, and
  # pnpm/action-setup@v4 internally running on Node 20).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  release:
    name: Release
    runs-on: ubicloud-standard-2
    env:
      GH_PACKAGES_TOKEN: ${{ github.token }}
      NODE_AUTH_TOKEN: ${{ github.token }}
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://npm.pkg.github.com
          scope: "@webpresso"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: pnpm install
      - name: Version packages
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          pnpm run version
          git add -A
          git diff --staged --quiet || (git commit -m "chore: version packages" && git push)
      - name: Build
        run: pnpm -r --workspace-concurrency=1 --include-workspace-root run build
      - name: Publish
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry-run != 'true' }}
        id: publish
        env:
          GH_PACKAGES_TOKEN: ${{ github.token }}
          NODE_AUTH_TOKEN: ${{ github.token }}
        run: |
          set -o pipefail
          pnpm changeset publish 2>&1 | tee /tmp/publish.log
          status=${PIPESTATUS[0]}
          echo "published=$(grep -c 'New tag' /tmp/publish.log || true)" >> "$GITHUB_OUTPUT"
          exit $status
      - name: Create marketplace release branch
        if: ${{ steps.publish.outputs.published != '0' && (github.event_name != 'workflow_dispatch' || inputs.dry-run != 'true') }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          BRANCH="release/v${VERSION}"
          git checkout -b "$BRANCH"
          pnpm build
          git add -f dist/
          git commit -m "chore: release v${VERSION} [dist]"
          git push origin "$BRANCH"
