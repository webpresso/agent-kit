# Changesets-driven release workflow.
#
# Flow:
#   1. Contributor runs `pnpm changeset` on their branch and commits the file.
#   2. On merge to main, this workflow opens/updates a "Version Packages" PR.
#   3. Merging the Version PR publishes to GitHub Packages and creates a
#      release/v<version> branch with dist/ committed for marketplace consumers.
#
# To release: merge the "Version Packages" PR created by this workflow.
# To dry-run: gh workflow run release.yml -f dry-run=true

name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Skip publish (version PR only)"
        type: boolean
        required: false
        default: true

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    env:
      GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
    permissions:
      contents: write
      packages: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PACKAGES_TOKEN }}
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: pnpm install
      - uses: changesets/action@v1.7.0
        id: changesets
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry-run != true }}
        with:
          publish: pnpm changeset publish
          version: pnpm changeset version
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Create marketplace release branch
        if: steps.changesets.outputs.published == 'true'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          BRANCH="release/v${VERSION}"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git checkout -b "$BRANCH"
          pnpm build
          git add -f dist/
          git commit -m "chore: release v${VERSION} [dist]"
          git push origin "$BRANCH"
