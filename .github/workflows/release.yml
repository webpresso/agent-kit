name: Release

# Thin caller for the reusable publish workflow that lives in
# `webpresso/webpresso/.github/workflows/release-package.yml`. Cross-repo
# `workflow_call` requires `webpresso/webpresso` Actions Access set to
# "Accessible from repositories in the 'webpresso' organization".
#
# To publish:  git tag v<X.Y.Z> && git push origin v<X.Y.Z>
# To dry-run:  gh workflow run release.yml -f dry-run=true

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Run publish in dry-run mode (no actual publish)"
        type: boolean
        required: false
        default: true

jobs:
  publish:
    uses: webpresso/webpresso/.github/workflows/release-package.yml@main
    permissions:
      contents: read
      packages: write
    with:
      packages: '["."]'
      build-command: "pnpm run build"
      dist-tag: "latest"
      dry-run: ${{ github.event_name == 'workflow_dispatch' && inputs.dry-run }}
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
