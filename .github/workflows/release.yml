# Changesets-driven release workflow — publishes directly on push to main,
# no intermediate Version PR. Also creates a release/v<N> branch with
# compiled dist/ for marketplace consumers.
#
# Flow:
#   1. Contributor runs `pnpm changeset` on their branch and commits the file.
#   2. On merge to main, this workflow bumps versions, commits, publishes,
#      and creates the dist branch.
#
# To dry-run: gh workflow run release.yml -f dry-run=true

name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Skip publish (version bump only)"
        type: boolean
        required: false
        default: false

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubicloud-standard-2
    env:
      GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PACKAGES_TOKEN }}
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: pnpm install
      - name: Version packages
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          pnpm run version
          git add -A
          git diff --staged --quiet || (git commit -m "chore: version packages" && git push)
      - name: Publish
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry-run != 'true' }}
        id: publish
        run: |
          set -o pipefail
          pnpm changeset publish 2>&1 | tee /tmp/publish.log
          status=${PIPESTATUS[0]}
          echo "published=$(grep -c 'New tag' /tmp/publish.log || true)" >> "$GITHUB_OUTPUT"
          exit $status
      # Public npm publish is gated — enable when ready to ship by setting
      # the ENABLE_NPM_PUBLISH repo variable to 'true' and adding NPM_TOKEN secret.
      - name: Publish webpresso to public npm
        if: ${{ vars.ENABLE_NPM_PUBLISH == 'true' && (github.event_name != 'workflow_dispatch' || inputs.dry-run != 'true') }}
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -o pipefail
          bun scripts/publish-webpresso.ts 2>&1 | tee /tmp/publish-public.log
      - name: Create marketplace release branch
        if: ${{ steps.publish.outputs.published != '0' && (github.event_name != 'workflow_dispatch' || inputs.dry-run != 'true') }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          BRANCH="release/v${VERSION}"
          git checkout -b "$BRANCH"
          pnpm build
          git add -f dist/
          git commit -m "chore: release v${VERSION} [dist]"
          git push origin "$BRANCH"
