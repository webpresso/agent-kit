# Changesets Action release workflow.
#
# Flow:
#   1. Contributors merge changeset files to main from feature branches.
#   2. The action opens/updates a "Version Packages" PR using `pnpm run version`.
#   3. When the version PR lands on main, the action publishes through
#      `pnpm run release:publish`.
#
# Release policy:
#   - public npm publish: yes
#   - GitHub Releases: yes — created in the post-publish path with the compiled
#     `wp` native runtime binaries (darwin/linux/windows × arm64/x64) attached as
#     downloadable assets. The changesets/action keeps `createGithubReleases:
#     false`; the release object is created here so custom binary assets can be
#     attached (the action cannot attach them).
#   - compatibility branch/tag behavior: handled separately from the publish path
#
# Trusted publishing note:
#   - npm trusted publishing is required for this workflow.
#   - The publish job uses OIDC (`id-token: write`) and expects npm-side trusted
#     publisher configuration for this repository/workflow/package tuple.
#   - npm provenance verification requires a GitHub-hosted runner: npm's registry
#     rejects provenance bundles from runners that report environment "self-hosted"
#     (including Ubicloud), even when OIDC tokens are present.
#   - Do not add `NPM_TOKEN` or `NODE_AUTH_TOKEN` fallbacks; token publishing is
#     intentionally disabled for Webpresso repos.
#
# To dry-run the version path: gh workflow run release.yml -f dry-run=true

name: Release

on:
  push:
    branches:
      - main
    paths:
      - ".changeset/**"
      - "package.json"
      - "packages/*/package.json"
      - "pnpm-lock.yaml"
      - "CHANGELOG.md"
      - "packages/*/CHANGELOG.md"
      - "scripts/release-publish.ts"
      - "scripts/github-release-notes.ts"
      - ".github/workflows/release.yml"
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Skip publish/pushes and validate the release artifact only"
        type: boolean
        required: false
        default: false

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: read

env:
  # Opt the workflow's JavaScript actions into Node.js 24 ahead of the
  # 2026-06-02 GitHub default switch (replaces the deprecation warning
  # surfaced by actions/checkout@v4, actions/setup-node@v4, and
  # pnpm/action-setup@v4 internally running on Node 20).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  session-memory-native-artifacts:
    name: Session memory native (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-x64
            runner: macos-15-intel
          - target: darwin-arm64
            runner: macos-15
          - target: linux-x64
            runner: ubuntu-24.04
          - target: linux-arm64
            runner: ubuntu-24.04-arm
          - target: win32-x64
            runner: windows-2025
          - target: win32-arm64
            runner: windows-11-arm
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24.16.0"
          package-manager-cache: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest
      - name: Install dependencies
        # The native matrix includes Windows ARM64, where unrelated workspace
        # postinstall packages such as workerd may not ship binaries. The build
        # script only needs JS dependencies present plus Rust/Bun below, so keep
        # lifecycle scripts disabled for this artifact-only job.
        run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Install Rust toolchain
        run: rustup toolchain install 1.88.0 --profile minimal
      - name: Build session-memory native artifact
        run: pnpm run build:session-memory-native -- --target ${{ matrix.target }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: session-memory-native-${{ matrix.target }}
          path: dist/session-memory-native/${{ matrix.target }}/session_memory_napi.node
          if-no-files-found: error

  release:
    name: Release
    needs: session-memory-native-artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24.16.0"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: session-memory-native-*
          path: ${{ runner.temp }}/session-memory-native-downloads

      - name: Assemble session-memory native artifacts
        shell: bash
        run: |
          set -euo pipefail
          artifact_root="$RUNNER_TEMP/session-memory-native-$GITHUB_RUN_ID"
          mkdir -p "$artifact_root"
          for artifact_dir in "$RUNNER_TEMP"/session-memory-native-downloads/session-memory-native-*; do
            target="${artifact_dir##*/session-memory-native-}"
            mkdir -p "${artifact_root}/${target}"
            cp "${artifact_dir}/session_memory_napi.node" "${artifact_root}/${target}/session_memory_napi.node"
          done
          actual_count="$(find "$artifact_root" -name session_memory_napi.node -type f | wc -l | tr -d ' ')"
          if [ "$actual_count" != "6" ]; then
            echo "Expected 6 session-memory native artifacts, found $actual_count" >&2
            find "$artifact_root" -maxdepth 3 -type f >&2
            exit 1
          fi

      - name: Stage native runtime artifacts
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry-run == true }}
        shell: bash
        run: |
          set -euo pipefail
          pnpm run build:runtime-binaries
          pnpm run stage:plugin-runtime
          pnpm run stage:session-memory-native -- --source-dir "$RUNNER_TEMP/session-memory-native-$GITHUB_RUN_ID"

      - name: Validate version path (dry run)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry-run == true }}
        shell: bash
        run: |
          set -euo pipefail
          pnpm run version
          npm pack --dry-run --json > "$RUNNER_TEMP/npm-pack-dry-run.json"
          node -e "const fs=require('fs'); const data=JSON.parse(fs.readFileSync(process.env.RUNNER_TEMP + '/npm-pack-dry-run.json','utf8')); const pack=Array.isArray(data)?data[0]:data; console.log(JSON.stringify({filename:pack.filename, unpackedSize:pack.unpackedSize, files:pack.files?.length}, null, 2));"

      - name: Reset publish result handoff
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry-run != true }}
        shell: bash
        run: rm -f "$RUNNER_TEMP/release-publish-result.json"

      - name: Create Release Pull Request or Publish
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry-run != true }}
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1 branch
        with:
          version: pnpm run version
          publish: pnpm run release:publish
          createGithubReleases: false
          commit: Version Packages
          title: Version Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HUSKY: "0"
          RELEASE_PUBLISH_RESULT_FILE: ${{ runner.temp }}/release-publish-result.json
          SESSION_MEMORY_NATIVE_ARTIFACTS_DIR: ${{ runner.temp }}/session-memory-native-${{ github.run_id }}

      - name: Read explicit publish result
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry-run != true }}
        id: publish_result
        shell: bash
        env:
          HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message || '' }}
        run: |
          set -euo pipefail
          result_file="$RUNNER_TEMP/release-publish-result.json"
          if [ ! -f "$result_file" ]; then
            {
              echo "published=false"
              echo "publish_state=missing"
              echo "should_finalize=false"
              echo "root_package_published=false"
              echo "non_root_package_count=0"
              echo "workspace_github_release_count=0"
              echo "packages_json=[]"
              echo "workspace_github_release_packages_json=[]"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          package_name=$(node -e "const data = require(process.argv[1]); process.stdout.write(data.packageName)" "$result_file")
          version=$(node -e "const data = require(process.argv[1]); process.stdout.write(data.version)" "$result_file")
          publish_state=$(node -e "const data = require(process.argv[1]); process.stdout.write(data.publishState)" "$result_file")
          packages_json=$(node -e "const data = require(process.argv[1]); const fallback = data.packageName && data.version && data.publishState ? [{ packageName: data.packageName, version: data.version, publishState: data.publishState }] : []; process.stdout.write(JSON.stringify(Array.isArray(data.packages) ? data.packages : fallback))" "$result_file")
          root_package_published=$(node -e "const packages = JSON.parse(process.argv[1]); process.stdout.write(String(packages.some((pkg) => pkg.packageName === '@webpresso/agent-kit')))" "$packages_json")
          non_root_package_count=$(node -e "const packages = JSON.parse(process.argv[1]); process.stdout.write(String(packages.filter((pkg) => pkg.packageName !== '@webpresso/agent-kit').length))" "$packages_json")
          workspace_github_release_packages_json=$(node -e "const packages = JSON.parse(process.argv[1]); process.stdout.write(JSON.stringify(packages.filter((pkg) => pkg.category === 'workspace-github-release')))" "$packages_json")
          workspace_github_release_count=$(node -e "const packages = JSON.parse(process.argv[1]); process.stdout.write(String(packages.length))" "$workspace_github_release_packages_json")
          should_finalize=false
          if [ "$publish_state" = "published" ]; then
            should_finalize=true
          elif [ "$publish_state" = "already-published" ] && [[ "$HEAD_COMMIT_MESSAGE" == Version\ Packages* ]]; then
            should_finalize=true
          fi

          {
            echo "published=true"
            echo "package_name=$package_name"
            echo "version=$version"
            echo "publish_state=$publish_state"
            echo "should_finalize=$should_finalize"
            echo "root_package_published=$root_package_published"
            echo "non_root_package_count=$non_root_package_count"
            echo "workspace_github_release_count=$workspace_github_release_count"
            echo "packages_json=$packages_json"
            echo "workspace_github_release_packages_json=$workspace_github_release_packages_json"
          } >> "$GITHUB_OUTPUT"

      - name: Probe published package version for artifact follow-up
        if: ${{ (github.event_name != 'workflow_dispatch' || inputs.dry-run != true) && steps.publish_result.outputs.should_finalize == 'true' }}
        id: registry_visibility
        shell: bash
        run: |
          set -euo pipefail
          packages_json='${{ steps.publish_result.outputs.packages_json }}'
          visible=false
          missing=()
          for delay in 0 5 15 30 60; do
            if [ "$delay" -gt 0 ]; then
              sleep "$delay"
            fi
            mapfile -t missing < <(node -e "const { spawnSync } = require('node:child_process'); const packages = JSON.parse(process.argv[1] || '[]'); for (const pkg of packages) { const result = spawnSync('npm', ['view', pkg.packageName + '@' + pkg.version, 'version', '--json'], { encoding: 'utf8' }); if (result.status !== 0) console.log(pkg.packageName + '@' + pkg.version); }" "$packages_json")
            if [ "${#missing[@]}" -eq 0 ]; then
              visible=true
              break
            fi
          done
          echo "visible=$visible" >> "$GITHUB_OUTPUT"
          if [ "$visible" != 'true' ]; then
            echo "::warning::Custom publish reported success, but npm registry visibility did not converge for: ${missing[*]}."
          fi

      - name: Resolve published version for artifacts
        if: ${{ (github.event_name != 'workflow_dispatch' || inputs.dry-run != true) && steps.publish_result.outputs.should_finalize == 'true' && steps.publish_result.outputs.root_package_published == 'true' }}
        id: release_meta
        shell: bash
        run: |
          set -euo pipefail
          version=$(node -p "require('./package.json').version")
          mainline_commit=$(node -e "const { execFileSync } = require('node:child_process'); const version = require('./package.json').version; const commits = execFileSync('git', ['rev-list', '--first-parent', 'HEAD'], { encoding: 'utf8' }).trim().split('\\n').filter(Boolean); const readVersionAt = (rev) => { try { return JSON.parse(execFileSync('git', ['show', rev + ':package.json'], { encoding: 'utf8' })).version } catch { return null } }; let candidate = null; for (const commit of commits) { const commitVersion = readVersionAt(commit); if (commitVersion === version) { candidate = commit; continue; } if (candidate) break; } if (!candidate) throw new Error('Could not locate first-parent commit carrying package version ' + version); process.stdout.write(candidate)")
          {
            echo "version=$version"
            echo "tag=v${version}"
            echo "branch=release/v${version}"
            echo "mainline_commit=$mainline_commit"
          } >> "$GITHUB_OUTPUT"

      - name: Create mainline release tag when missing
        if: ${{ (github.event_name != 'workflow_dispatch' || inputs.dry-run != true) && steps.publish_result.outputs.should_finalize == 'true' && steps.publish_result.outputs.root_package_published == 'true' }}
        id: release_tag
        shell: bash
        run: |
          set -euo pipefail
          tag='${{ steps.release_meta.outputs.tag }}'
          target_commit='${{ steps.release_meta.outputs.mainline_commit }}'
          current_local_tag=''
          if git rev-parse "${tag}^{commit}" >/dev/null 2>&1; then
            current_local_tag=$(git rev-parse "${tag}^{commit}")
          fi
          if [ "$current_local_tag" != "$target_commit" ]; then
            git tag -f "${tag}" "$target_commit"
          fi
          current_remote_tag=''
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/tmp/release-tag-ref.txt 2>/dev/null; then
            current_remote_tag=$(awk '{print $1}' /tmp/release-tag-ref.txt)
          fi
          if [ "$current_remote_tag" = "$target_commit" ]; then
            echo "Tag ${tag} already exists on origin at ${target_commit}; skipping push."
          else
            HUSKY=0 git push --force origin "refs/tags/${tag}"
          fi

      - name: Verify tag points at the published mainline commit
        if: ${{ (github.event_name != 'workflow_dispatch' || inputs.dry-run != true) && steps.publish_result.outputs.should_finalize == 'true' && steps.publish_result.outputs.root_package_published == 'true' }}
        id: verify_release_tag
        shell: bash
        run: |
          set -euo pipefail
          tag_commit=$(git rev-parse "${{ steps.release_meta.outputs.tag }}^{commit}")
          mainline_commit='${{ steps.release_meta.outputs.mainline_commit }}'
          if [ "$tag_commit" != "$mainline_commit" ]; then
            echo "Expected tag ${{ steps.release_meta.outputs.tag }} to point at published mainline commit ($mainline_commit), got $tag_commit" >&2
            exit 1
          fi

      - name: Create marketplace compatibility branch
        if: ${{ (github.event_name != 'workflow_dispatch' || inputs.dry-run != true) && steps.publish_result.outputs.should_finalize == 'true' && steps.publish_result.outputs.root_package_published == 'true' }}
        id: compatibility_branch
        shell: bash
        run: |
          set -euo pipefail
          branch='${{ steps.release_meta.outputs.branch }}'
          version='${{ steps.release_meta.outputs.version }}'
          base_commit=$(git rev-parse "${{ steps.release_meta.outputs.tag }}^{commit}")

          if git ls-remote --exit-code --heads origin "$branch" >/dev/null 2>&1; then
            echo "status=existing" >> "$GITHUB_OUTPUT"
            echo "Compatibility branch $branch already exists; skipping creation."
            exit 0
          fi

          git restore --source=HEAD --staged --worktree package.json
          git switch -C "$branch" "$base_commit"
          git add -f dist/esm/
          if git diff --staged --quiet; then
            echo "status=skipped-no-dist" >> "$GITHUB_OUTPUT"
            echo "No dist changes to commit for $branch; skipping branch creation."
            exit 0
          fi

          HUSKY=0 git commit -m "chore: release v${version} [dist]"
          HUSKY=0 git push origin "HEAD:refs/heads/${branch}"
          echo "status=created" >> "$GITHUB_OUTPUT"

      - name: Publish workspace package GitHub Releases
        if: ${{ (github.event_name != 'workflow_dispatch' || inputs.dry-run != true) && steps.publish_result.outputs.should_finalize == 'true' && steps.publish_result.outputs.workspace_github_release_count != '0' }}
        id: workspace_github_releases
        env:
          HUSKY: "0"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGES_JSON: ${{ steps.publish_result.outputs.workspace_github_release_packages_json }}
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const { execFileSync } = require('node:child_process')
          const { appendFileSync } = require('node:fs')

          const packages = JSON.parse(process.env.PACKAGES_JSON || '[]')
          const targetCommit = process.env.GITHUB_SHA
          const urls = []

          for (const pkg of packages) {
            const tag = `${pkg.packageName}@${pkg.version}`
            const title = tag
            const notesFile = `${process.env.RUNNER_TEMP}/${pkg.packageName.replace(/[^a-z0-9.-]+/giu, '-')}-${pkg.version}-notes.md`
            execFileSync('bun', [
              'scripts/github-release-notes.ts',
              '--package',
              pkg.packageName,
              '--version',
              pkg.version,
              '--out',
              notesFile,
            ], { stdio: 'inherit' })

            execFileSync('git', ['tag', '-f', tag, targetCommit], { stdio: 'inherit' })
            let remoteCommit = ''
            try {
              remoteCommit = execFileSync('git', [
                'ls-remote',
                '--exit-code',
                '--tags',
                'origin',
                `refs/tags/${tag}`,
              ], { encoding: 'utf8' }).trim().split(/\s+/u)[0] ?? ''
            } catch {
              remoteCommit = ''
            }
            if (remoteCommit !== targetCommit) {
              execFileSync('git', ['push', '--force', 'origin', `refs/tags/${tag}`], {
                stdio: 'inherit',
              })
            }

            try {
              execFileSync('gh', ['release', 'view', tag], { stdio: 'ignore' })
              execFileSync('gh', ['release', 'edit', tag, '--title', title, '--notes-file', notesFile], {
                stdio: 'inherit',
              })
            } catch {
              execFileSync('gh', [
                'release',
                'create',
                tag,
                '--verify-tag',
                '--title',
                title,
                '--notes-file',
                notesFile,
              ], { stdio: 'inherit' })
            }
            const releaseJson = execFileSync('gh', ['release', 'view', tag, '--json', 'url'], {
              encoding: 'utf8',
            })
            urls.push(JSON.parse(releaseJson).url)
          }

          appendFileSync(process.env.GITHUB_OUTPUT, `count=${packages.length}\n`)
          appendFileSync(process.env.GITHUB_OUTPUT, `urls=${urls.join(',')}\n`)
          NODE

      - name: Build native runtime binaries for the GitHub Release
        if: ${{ (github.event_name != 'workflow_dispatch' || inputs.dry-run != true) && steps.publish_result.outputs.should_finalize == 'true' && steps.publish_result.outputs.root_package_published == 'true' }}
        id: build_release_assets
        shell: bash
        run: |
          set -euo pipefail
          assets="$RUNNER_TEMP/release-assets"
          mkdir -p "$assets"
          # bun cross-compiles every target from this single Linux runner. Each
          # target build fails loudly if its toolchain is unavailable — no
          # silent skip — so a partial matrix never ships.
          for target in darwin-arm64 darwin-x64 linux-x64 linux-arm64 windows-x64; do
            pnpm run build:runtime-binaries -- --target "$target"
          done
          for target in darwin-arm64 darwin-x64 linux-x64 linux-arm64; do
            cp "dist/runtime/$target/wp" "$assets/wp-$target"
          done
          cp "dist/runtime/windows-x64/wp.exe" "$assets/wp-windows-x64.exe"
          asset_count=$(find "$assets" -maxdepth 1 -type f | wc -l | tr -d ' ')
          if [ "$asset_count" -ne 5 ]; then
            echo "Expected 5 release assets, found $asset_count" >&2
            exit 1
          fi
          echo "asset_count=$asset_count" >> "$GITHUB_OUTPUT"
          ls -l "$assets"

      - name: Publish GitHub Release with native runtime binaries
        if: ${{ (github.event_name != 'workflow_dispatch' || inputs.dry-run != true) && steps.publish_result.outputs.should_finalize == 'true' && steps.publish_result.outputs.root_package_published == 'true' }}
        id: publish_github_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          assets="$RUNNER_TEMP/release-assets"
          tag='${{ steps.release_meta.outputs.tag }}'
          version='${{ steps.release_meta.outputs.version }}'
          notes_file="$RUNNER_TEMP/github-release-notes-${version}.md"
          bun scripts/github-release-notes.ts \
            --package '@webpresso/agent-kit' \
            --version "$version" \
            --runtime-assets \
            --out "$notes_file"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" --title "v${version}" --notes-file "$notes_file"
            gh release upload "$tag" "$assets"/* --clobber
          else
            gh release create "$tag" \
              --verify-tag \
              --title "v${version}" \
              --notes-file "$notes_file" \
              "$assets"/*
          fi

      - name: Verify GitHub Release assets
        if: ${{ (github.event_name != 'workflow_dispatch' || inputs.dry-run != true) && steps.publish_result.outputs.should_finalize == 'true' && steps.publish_result.outputs.root_package_published == 'true' }}
        id: verify_github_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          tag='${{ steps.release_meta.outputs.tag }}'
          release_json=$(gh release view "$tag" --json url,assets)
          release_url=$(node -e "const release = JSON.parse(process.argv[1]); process.stdout.write(release.url)" "$release_json")
          asset_count=$(node -e "const release = JSON.parse(process.argv[1]); process.stdout.write(String(release.assets.length))" "$release_json")
          node -e "const release = JSON.parse(process.argv[1]); const expected = ['wp-darwin-arm64','wp-darwin-x64','wp-linux-x64','wp-linux-arm64','wp-windows-x64.exe']; const names = new Set(release.assets.map((asset) => asset.name)); const missing = expected.filter((name) => !names.has(name)); if (missing.length > 0) { console.error('Missing release assets: ' + missing.join(', ')); process.exit(1); }" "$release_json"
          {
            echo "release_url=$release_url"
            echo "asset_count=$asset_count"
          } >> "$GITHUB_OUTPUT"

      - name: Assert release finalization contract
        if: ${{ always() && (github.event_name != 'workflow_dispatch' || inputs.dry-run != true) && steps.publish_result.outputs.should_finalize == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          failures=0

          expect_success() {
            local outcome="$1"
            local label="$2"
            if [ "$outcome" != 'success' ]; then
              echo "::error::${label} outcome after publish was '${outcome:-missing}'." >&2
              failures=1
            fi
          }

          root_package_published='${{ steps.publish_result.outputs.root_package_published }}'
          non_root_package_count='${{ steps.publish_result.outputs.non_root_package_count }}'
          workspace_github_release_count='${{ steps.publish_result.outputs.workspace_github_release_count }}'

          if [ "$root_package_published" = 'true' ]; then
            expect_success '${{ steps.release_meta.outcome }}' 'Release metadata resolution'
            expect_success '${{ steps.release_tag.outcome }}' 'Release tag creation'
            expect_success '${{ steps.verify_release_tag.outcome }}' 'Release tag verification'
            expect_success '${{ steps.compatibility_branch.outcome }}' 'Compatibility branch step'
            expect_success '${{ steps.build_release_assets.outcome }}' 'Runtime asset build'
            expect_success '${{ steps.publish_github_release.outcome }}' 'Root GitHub Release publish'
            expect_success '${{ steps.verify_github_release.outcome }}' 'Root GitHub Release verification'

            branch_status='${{ steps.compatibility_branch.outputs.status }}'
            case "$branch_status" in
              created|existing|skipped-no-dist)
                ;;
              *)
                echo "::error::Compatibility branch step did not record an allowed terminal status (got '${branch_status:-missing}')." >&2
                failures=1
                ;;
            esac

            if [ '${{ steps.build_release_assets.outputs.asset_count }}' != '5' ]; then
              echo "::error::Expected 5 built release assets." >&2
              failures=1
            fi
            if [ '${{ steps.verify_github_release.outputs.asset_count }}' != '5' ]; then
              echo "::error::Expected 5 uploaded release assets." >&2
              failures=1
            fi
            if [ -z '${{ steps.verify_github_release.outputs.release_url }}' ]; then
              echo "::error::Root GitHub Release verification did not report a release URL." >&2
              failures=1
            fi
          fi

          if [ "${workspace_github_release_count:-0}" -gt 0 ]; then
            expect_success '${{ steps.workspace_github_releases.outcome }}' 'Workspace package GitHub Release publish'
            if [ '${{ steps.workspace_github_releases.outputs.count }}' != "$workspace_github_release_count" ]; then
              echo "::error::Expected ${workspace_github_release_count} workspace package GitHub Release(s)." >&2
              failures=1
            fi
          fi

          if [ "$failures" -ne 0 ]; then
            exit 1
          fi

      - name: Release summary
        if: ${{ always() }}
        shell: bash
        run: |
          {
            echo "## Release summary"
            echo ""
            echo "- dry_run: ${{ github.event_name == 'workflow_dispatch' && inputs.dry-run || false }}"
            echo "- hasChangesets: ${{ steps.changesets.outputs.hasChangesets || 'n/a' }}"
            echo "- published: ${{ steps.publish_result.outputs.published || steps.changesets.outputs.published || 'false' }}"
            echo "- publish_state: ${{ steps.publish_result.outputs.publish_state || 'missing' }}"
            echo "- should_finalize: ${{ steps.publish_result.outputs.should_finalize || 'false' }}"
            echo "- publishedPackages: ${{ steps.publish_result.outputs.packages_json || steps.changesets.outputs.publishedPackages || '[]' }}"
            echo "- root_package_published: ${{ steps.publish_result.outputs.root_package_published || 'false' }}"
            echo "- non_root_package_count: ${{ steps.publish_result.outputs.non_root_package_count || '0' }}"
            echo "- workspace_github_release_count: ${{ steps.publish_result.outputs.workspace_github_release_count || '0' }}"
            echo "- workspaceGithubReleasePackages: ${{ steps.publish_result.outputs.workspace_github_release_packages_json || '[]' }}"
            echo "- registry_visible: ${{ steps.registry_visibility.outputs.visible || 'n/a' }}"
            echo "- version: ${{ steps.release_meta.outputs.version || 'n/a' }}"
            echo "- tag: ${{ steps.release_meta.outputs.tag || 'n/a' }}"
            echo "- release_branch: ${{ steps.release_meta.outputs.branch || 'n/a' }}"
            echo "- release_branch_status: ${{ steps.compatibility_branch.outputs.status || 'n/a' }}"
            echo "- release_asset_count: ${{ steps.verify_github_release.outputs.asset_count || 'n/a' }}"
            echo "- release_url: ${{ steps.verify_github_release.outputs.release_url || 'n/a' }}"
            echo "- workspace_release_count: ${{ steps.workspace_github_releases.outputs.count || '0' }}"
            echo "- workspace_release_urls: ${{ steps.workspace_github_releases.outputs.urls || 'n/a' }}"
          } >> "$GITHUB_STEP_SUMMARY"
