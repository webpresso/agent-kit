# Changesets-driven release workflow — publishes directly on push to main,
# no intermediate Version PR. Also creates a release/v<N> branch with
# compiled dist/ for marketplace consumers.
#
# Flow:
#   1. Contributor runs `pnpm changeset` on their branch and commits the file.
#   2. On merge to main, this workflow bumps versions, commits, publishes,
#      and creates the dist branch.
#
# To dry-run: gh workflow run release.yml -f dry-run=true

name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Skip publish (version bump only)"
        type: boolean
        required: false
        default: false

concurrency: ${{ github.workflow }}-${{ github.ref }}

env:
  # Opt the workflow's JavaScript actions into Node.js 24 ahead of the
  # 2026-06-02 GitHub default switch (replaces the deprecation warning
  # surfaced by actions/checkout@v4, actions/setup-node@v4, and
  # pnpm/action-setup@v4 internally running on Node 20).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  auth-preflight:
    name: Auth preflight
    runs-on: ubicloud-standard-2
    permissions:
      contents: read
      packages: read
    outputs:
      repo_access_ok: ${{ steps.repo.outputs.repo_access_ok }}
      action_downloads_ok: ${{ steps.actions.outputs.action_downloads_ok }}
      packages_token_ok: ${{ steps.packages.outputs.packages_token_ok }}
    steps:
      - name: Probe repository access
        id: repo
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if git ls-remote "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD >/dev/null 2>&1; then
            echo "repo_access_ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "repo_access_ok=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Probe public action downloads
        id: actions
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          urls=(
            "https://api.github.com/repos/actions/checkout/tarball/refs/tags/v5"
            "https://api.github.com/repos/pnpm/action-setup/tarball/refs/tags/v6"
            "https://api.github.com/repos/actions/setup-node/tarball/refs/tags/v5"
            "https://api.github.com/repos/oven-sh/setup-bun/tarball/refs/tags/v2"
          )
          for url in "${urls[@]}"; do
            if ! curl -fsSIL -H "Authorization: Bearer ${GITHUB_TOKEN}" -H "Accept: application/vnd.github+json" "$url" >/dev/null; then
              echo "action_downloads_ok=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done
          echo "action_downloads_ok=true" >> "$GITHUB_OUTPUT"
      - name: Mark package probe not required
        id: packages
        shell: bash
        run: |
          set -euo pipefail
          # agent-kit intentionally avoids an install-time dependency on
          # GitHub Packages runtime leaf or umbrella packages. Keep the
          # shared auth-preflight output contract, but mark package auth as
          # not required for this repo's release install path.
          echo "packages_token_ok=true" >> "$GITHUB_OUTPUT"

  release:
    name: Release
    runs-on: ubicloud-standard-2
    needs: auth-preflight
    if: ${{ needs.auth-preflight.outputs.repo_access_ok == 'true' && needs.auth-preflight.outputs.action_downloads_ok == 'true' && needs.auth-preflight.outputs.packages_token_ok == 'true' }}
    env:
      GH_PACKAGES_TOKEN: ${{ github.token }}
      NODE_AUTH_TOKEN: ${{ github.token }}
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://npm.pkg.github.com
          scope: "@webpresso"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: pnpm install
      - name: Version packages
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          pnpm run version
          git add -A
          git diff --staged --quiet || (git commit -m "chore: version packages" && git push)
      - name: Build
        run: pnpm -r --workspace-concurrency=1 --include-workspace-root run build
      - name: Publish
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry-run != 'true' }}
        id: publish
        env:
          GH_PACKAGES_TOKEN: ${{ github.token }}
          NODE_AUTH_TOKEN: ${{ github.token }}
        run: |
          set -o pipefail
          publish_log=/tmp/publish.log
          if pnpm publish --no-git-checks 2>&1 | tee "$publish_log"; then
            echo "published=1" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          status=${PIPESTATUS[0]}
          if grep -qi 'cannot publish over the previously published version' "$publish_log"; then
            echo "published=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "published=0" >> "$GITHUB_OUTPUT"
          exit "$status"
      - name: Create marketplace release branch
        if: ${{ steps.publish.outputs.published != '0' && (github.event_name != 'workflow_dispatch' || inputs.dry-run != 'true') }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          BRANCH="release/v${VERSION}"
          git checkout -b "$BRANCH"
          pnpm build
          git add -f dist/
          git commit -m "chore: release v${VERSION} [dist]"
          git push origin "$BRANCH"
