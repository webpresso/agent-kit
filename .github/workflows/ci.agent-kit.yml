name: CI (agent-kit self)

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

env:
  # Opt the workflow's JavaScript actions into Node.js 24 ahead of the
  # 2026-06-02 GitHub default switch (replaces the deprecation warning
  # surfaced by actions/checkout@v4, actions/setup-node@v4, and
  # pnpm/action-setup@v4 internally running on Node 20).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  auth-preflight:
    name: Auth preflight
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    outputs:
      repo_access_ok: ${{ steps.repo.outputs.repo_access_ok }}
      action_downloads_ok: ${{ steps.actions.outputs.action_downloads_ok }}
      packages_token_ok: ${{ steps.packages.outputs.packages_token_ok }}
    steps:
      - name: Probe repository access
        id: repo
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if git ls-remote "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD >/dev/null 2>&1; then
            echo "repo_access_ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "repo_access_ok=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Probe public action downloads
        id: actions
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          urls=(
            "https://api.github.com/repos/actions/checkout/tarball/refs/tags/v7"
            "https://api.github.com/repos/pnpm/action-setup/tarball/refs/tags/v6"
            "https://api.github.com/repos/actions/setup-node/tarball/refs/tags/v6.4.0"
            "https://api.github.com/repos/oven-sh/setup-bun/tarball/refs/tags/v2"
            "https://api.github.com/repos/Swatinem/rust-cache/tarball/e18b497796c12c097a38f9edb9d0641fb99eee32"
            "https://api.github.com/repos/taiki-e/install-action/tarball/bffeee26d4db9be238a4ea78d8826604ebcb594d"
          )
          for url in "${urls[@]}"; do
            if ! curl -fsSIL -H "Authorization: Bearer ${GITHUB_TOKEN}" -H "Accept: application/vnd.github+json" "$url" >/dev/null; then
              echo "action_downloads_ok=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done
          echo "action_downloads_ok=true" >> "$GITHUB_OUTPUT"
      - name: Mark package probe not required
        id: packages
        shell: bash
        run: |
          set -euo pipefail
          # agent-kit intentionally avoids an install-time dependency on
          # GitHub Packages runtime leaf or umbrella packages. Keep the
          # shared auth-preflight output contract, but mark package auth as
          # not required for this repo's CI install path.
          echo "packages_token_ok=true" >> "$GITHUB_OUTPUT"
      - name: Summarize auth preflight
        if: ${{ always() }}
        shell: bash
        run: |
          {
            echo "## Auth preflight"
            echo ""
            echo "- repo_access_ok: ${{ steps.repo.outputs.repo_access_ok }}"
            echo "- action_downloads_ok: ${{ steps.actions.outputs.action_downloads_ok }}"
            echo "- packages_token_ok: ${{ steps.packages.outputs.packages_token_ok }}"
          } >> "$GITHUB_STEP_SUMMARY"

  ci-change-scope:
    name: CI change scope
    runs-on: ubuntu-latest
    needs: auth-preflight
    if: ${{ needs.auth-preflight.outputs.repo_access_ok == 'true' && needs.auth-preflight.outputs.action_downloads_ok == 'true' && needs.auth-preflight.outputs.packages_token_ok == 'true' }}
    outputs:
      native_session_memory_changed: ${{ steps.scope.outputs.native_session_memory_changed }}
      playwright_e2e_present: ${{ steps.scope.outputs.playwright_e2e_present }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Classify CI change scope
        id: scope
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: scripts/ci/change-scope.sh

  blueprint-gate:
    name: Blueprint gate
    if: ${{ github.event_name == 'pull_request' && !startsWith(github.head_ref, 'changeset-release/') && needs.auth-preflight.outputs.repo_access_ok == 'true' && needs.auth-preflight.outputs.action_downloads_ok == 'true' && needs.auth-preflight.outputs.packages_token_ok == 'true' }}
    runs-on: ubuntu-latest
    needs: auth-preflight
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.16.0"
          cache: pnpm
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest
      - run: pnpm install --frozen-lockfile
      - name: Require blueprint coverage for non-doc PRs
        run: ./bin/wp audit blueprint-pr-coverage --base "${{ github.event.pull_request.base.sha }}"

  lint-typecheck:
    name: Lint & typecheck
    runs-on: ubuntu-latest
    needs: auth-preflight
    if: ${{ needs.auth-preflight.outputs.repo_access_ok == 'true' && needs.auth-preflight.outputs.action_downloads_ok == 'true' && needs.auth-preflight.outputs.packages_token_ok == 'true' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.16.0"
          cache: pnpm
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest
      - run: pnpm install --frozen-lockfile
      - name: Stage native runtime artifacts
        run: |
          pnpm run build:runtime-binaries
          pnpm run stage:plugin-runtime
      - name: Open-source license surface
        run: pnpm run license:check
      - name: Dependency security audit
        run: pnpm run deps:security
      - name: Dependency freshness audit
        run: pnpm run deps:freshness
      - run: pnpm run typecheck
      - run: pnpm run lint

  native-session-memory:
    name: Native session-memory
    runs-on: ubuntu-latest
    needs: [auth-preflight, ci-change-scope]
    if: ${{ needs.auth-preflight.outputs.repo_access_ok == 'true' && needs.auth-preflight.outputs.action_downloads_ok == 'true' && needs.auth-preflight.outputs.packages_token_ok == 'true' && (github.event_name != 'pull_request' || needs.ci-change-scope.outputs.native_session_memory_changed == 'true') }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.16.0"
          cache: pnpm
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest
      - name: Install Rust toolchain for native session-memory checks
        run: rustup toolchain install 1.88.0 --profile minimal --component rustfmt,clippy
      - name: Cache Rust cargo and target directories
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          workspaces: native/session-memory-engine -> target
      - name: Install cargo-deny
        uses: taiki-e/install-action@9bcaee1dcae34154180f412e2fa69355a7cda9f6 # v2
        with:
          tool: cargo-deny@0.19.9
      - run: pnpm install --frozen-lockfile
      - name: Native session-memory fmt
        run: pnpm run native:session-memory:fmt
      - name: Native session-memory clippy
        run: pnpm run native:session-memory:clippy
      - name: Native session-memory cargo-deny
        run: pnpm run native:session-memory:deny
      - name: Native session-memory test
        run: pnpm run native:session-memory:test
      - name: Native session-memory bench gate
        run: |
          pnpm run native:session-memory:bench:run
          pnpm run native:session-memory:bench:gate

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: auth-preflight
    if: ${{ needs.auth-preflight.outputs.repo_access_ok == 'true' && needs.auth-preflight.outputs.action_downloads_ok == 'true' && needs.auth-preflight.outputs.packages_token_ok == 'true' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.16.0"
          cache: pnpm
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest
      - run: pnpm install --frozen-lockfile
      - name: Stage native runtime artifacts
        run: |
          pnpm run build:runtime-binaries
          pnpm run stage:plugin-runtime
      - name: Warm native session-memory addon
        env:
          WP_NATIVE_SESSION_MEMORY_BUILD_FROM_SOURCE: "1"
        run: pnpm exec tsx --eval "import { loadNativeSessionMemoryEngine } from './src/session-memory/native-runtime.ts'; loadNativeSessionMemoryEngine()"
      - run: pnpm run test
      - name: Cursor hook contract slice
        run: |
          bun src/cli/cli.ts test \
            --file src/cli/commands/init/scaffolders/agent-hooks/emitters/cursor.test.ts \
            --file src/cli/commands/init/scaffolders/agent-hooks/schemas/schemas.test.ts \
            --file src/cli/commands/init/scaffolders/agent-hooks/capability-matrix.test.ts
      - name: Bench fixture compatibility gate
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          bun test scripts/bench/lib/usage-extractor.test.ts
          bun test scripts/bench/lib/refresh-cli-fixture.test.ts

  audits:
    name: Audits
    runs-on: ubuntu-latest
    needs: auth-preflight
    if: ${{ needs.auth-preflight.outputs.repo_access_ok == 'true' && needs.auth-preflight.outputs.action_downloads_ok == 'true' && needs.auth-preflight.outputs.packages_token_ok == 'true' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.16.0"
          cache: pnpm
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest
      - run: pnpm install --frozen-lockfile
      - name: Stage native runtime artifacts
        run: |
          pnpm run build:runtime-binaries
          pnpm run stage:plugin-runtime
      - name: Verify secret provider correctness
        run: pnpm run verify:secrets
      - name: Quarantine secret provider drift
        run: pnpm run audit:secret-provider-quarantine
      - name: Stage packed surface for external scanning
        run: |
          rm -rf .webpresso-packed-surface
          bun scripts/stage-packed-surface.ts .webpresso-packed-surface
      - name: Gitleaks packed surface
        uses: docker://ghcr.io/gitleaks/gitleaks@sha256:c00b6bd0aeb3071cbcb79009cb16a60dd9e0a7c60e2be9ab65d25e6bc8abbb7f # latest on 2026-05-30
        with:
          args: dir --exit-code 1 /github/workspace/.webpresso-packed-surface
      - name: Run wp audit guardrails
        run: ./bin/wp audit guardrails

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    needs: [auth-preflight, ci-change-scope]
    if: ${{ needs.auth-preflight.outputs.repo_access_ok == 'true' && needs.auth-preflight.outputs.action_downloads_ok == 'true' && needs.auth-preflight.outputs.packages_token_ok == 'true' && needs.ci-change-scope.outputs.playwright_e2e_present == 'true' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.16.0"
          cache: pnpm
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest
      - run: pnpm install --frozen-lockfile
      - name: Run e2e when Playwright bootstrap is present
        run: |
          if [ ! -f playwright.config.ts ]; then
            echo "Skipping e2e: playwright.config.ts not present."
            exit 0
          fi

          pnpm run e2e

  architecture-drift:
    name: Architecture drift
    runs-on: ubuntu-latest
    needs: auth-preflight
    if: ${{ needs.auth-preflight.outputs.repo_access_ok == 'true' && needs.auth-preflight.outputs.action_downloads_ok == 'true' && needs.auth-preflight.outputs.packages_token_ok == 'true' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.16.0"
          cache: pnpm
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest
      - run: pnpm install --frozen-lockfile
      - name: Check architecture drift contract
        run: ./bin/wp audit architecture-drift --root .

  deploy-verify:
    name: Deploy verify
    runs-on: ubuntu-latest
    needs: auth-preflight
    if: ${{ needs.auth-preflight.outputs.repo_access_ok == 'true' && needs.auth-preflight.outputs.action_downloads_ok == 'true' && needs.auth-preflight.outputs.packages_token_ok == 'true' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.16.0"
          cache: pnpm
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest
      - run: pnpm install --frozen-lockfile
      - name: Verify deploy-contract gate when production release metadata is present
        run: |
          set -euo pipefail

          METADATA_PATH='infra/release-metadata.production.json'

          if [ ! -f "$METADATA_PATH" ]; then
            echo "No production release metadata present at $METADATA_PATH; skipping deploy-contract gate."
            exit 0
          fi

          if ! node -e "const pkg=require('./package.json'); process.exit(pkg.scripts && pkg.scripts['verify:deploy-contract'] ? 0 : 1)"; then
            echo "::error::Detected $METADATA_PATH but no verify:deploy-contract script."
            echo "::error::Repos adopting the shared deploy contract must keep agent-kit provider-neutral and supply a repo-owned deploy verifier."
            echo "::error::That verifier owns provider-specific env-name derivation, Preview-URL prohibitions for DO previews, and must fail closed for migration-bearing Durable Object releases."
            exit 1
          fi

          pnpm run verify:deploy-contract

  bundle-smoke:
    name: Bundle smoke
    runs-on: ubuntu-latest
    needs: auth-preflight
    if: ${{ needs.auth-preflight.outputs.repo_access_ok == 'true' && needs.auth-preflight.outputs.action_downloads_ok == 'true' && needs.auth-preflight.outputs.packages_token_ok == 'true' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.16.0"
          cache: pnpm
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest
      - uses: voidzero-dev/setup-vp@2dec1e33f4ab2c6d5bce1b0c4607961bb1a3f7a1 # v1.12.0
        with:
          node-version: "24.16.0"
          cache: false
          run-install: false
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Stage native runtime artifacts
        run: |
          pnpm run build:runtime-binaries
          pnpm run stage:plugin-runtime
      - name: Run bundle smoke
        # WP_SKIP_GSTACK and WP_SKIP_RTK skip optional network-dependent
        # scaffolders (git clone / binary download) that require external
        # network access and are not the subject of this smoke test.
        # NO_COLOR=1 suppresses ANSI escape codes in non-TTY output.
        env:
          WP_SKIP_GSTACK: "1"
          WP_SKIP_RTK: "1"
          NO_COLOR: "1"
          FORCE_COLOR: "0"
        run: |
          set -euo pipefail

          PACKAGE_VERSION="$(node -p "require('./package.json').version")"

          # The fixture directory is not a git repo; wp setup requires one.
          cd test-fixtures/bundle-smoke
          git init --quiet
          git config user.email "ci@example.com"
          git config user.name "CI"

          node -e "const fs=require('fs'); const pkg=JSON.parse(fs.readFileSync('package.json','utf8')); pkg.devDependencies={...(pkg.devDependencies||{}), '@webpresso/agent-kit': '^' + process.argv[1]}; fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');" "$PACKAGE_VERSION"

          # Install the checked-out package globally through Vite+ so the smoke
          # exercises the public consumer execution contract (`wp` on PATH)
          # against the candidate source, not the last published package.
          vp install -g ../..

          # Run wp setup; non-interactive defaults are standard. Capture stdout + stderr.
          # Some delegated package-manager/plugin installers still emit ANSI even
          # when NO_COLOR is set, so normalize the captured transcript before
          # asserting the agent-kit-owned framing contract.
          RAW_OUTPUT=$(wp setup 2>&1) || {
            echo "--- wp setup output ---"
            echo "$RAW_OUTPUT"
            echo "FAIL: wp setup exited non-zero"
            exit 1
          }
          OUTPUT=$(printf '%s' "$RAW_OUTPUT" | perl -pe 's/\e\[[0-9;]*[[:alpha:]]//g')

          echo "--- wp setup output ---"
          echo "$RAW_OUTPUT"

          # Assert via here-strings, never `echo "$OUTPUT" | grep -q`: under
          # `set -o pipefail`, grep -q closes the pipe on first match while echo
          # is still writing, so echo takes SIGPIPE (141) and pipefail turns a
          # successful match into a false failure. The race only trips on large
          # output (e.g. when the codex-hook-trust warning is present in CI).

          # Assert 1: lane-4 framing printed (Task 1.6 requirement)
          grep -qF 'Lane 1 wp_*' <<<"$OUTPUT" || {
            echo "FAIL: lane framing missing — expected 'Lane 1 wp_*' in output"
            exit 1
          }

          # Assert 2: next-steps block printed
          grep -qF 'Setup complete' <<<"$OUTPUT" || {
            echo "FAIL: next-steps missing — expected 'Setup complete' in output"
            exit 1
          }

          echo "PASS: bundle smoke"

  wp-check:
    name: WP check
    runs-on: ubuntu-latest
    if: always()
    needs:
      [
        ci-change-scope,
        lint-typecheck,
        test,
        native-session-memory,
        audits,
        bundle-smoke,
        blueprint-gate,
        e2e,
        architecture-drift,
        deploy-verify,
      ]
    steps:
      - name: All jobs passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more required jobs failed or were cancelled."
            exit 1
          fi
          echo "All checks passed."
