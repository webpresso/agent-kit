name: CI (webpresso baseline)

on:
  push:
    branches: [main, master]
  pull_request:

env:
  # Opt the workflow's JavaScript actions into Node.js 24 ahead of the
  # 2026-06-02 GitHub default switch (replaces the deprecation warning
  # surfaced by actions/checkout@v4, actions/setup-node@v4, and
  # pnpm/action-setup@v4 internally running on Node 20).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  # Authenticate to GitHub Packages so `pnpm install --frozen-lockfile`
  # can fetch @webpresso/* scoped deps (e.g. @webpresso/runtime-storage,
  # @webpresso/runtime-format). `.npmrc` references ${GH_PACKAGES_TOKEN};
  # without this env entry the substitution becomes empty and pnpm gets
  # 401 Unauthorized. Mirrors release.yml's per-job auth wiring at
  # workflow scope so check/test/wp-audits all inherit it.
  GH_PACKAGES_TOKEN: ${{ github.token || secrets.GITHUB_TOKEN }}

jobs:
  check:
    runs-on: ubicloud-standard-2
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v5
        with:
          node-version: '24.16.0'
          cache: pnpm
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm run lint

  test:
    runs-on: ubicloud-standard-2
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v5
        with:
          node-version: '24.16.0'
          cache: pnpm
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test

  wp-audits:
    runs-on: ubicloud-standard-2
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v5
        with:
          node-version: '24.16.0'
          cache: pnpm
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: pnpm install --frozen-lockfile
      - name: Stage packed surface for external scanning
        run: |
          rm -rf .webpresso-packed-surface
          bun scripts/stage-packed-surface.ts .webpresso-packed-surface
      - name: Gitleaks packed surface
        uses: docker://ghcr.io/gitleaks/gitleaks:latest
        with:
          args: dir --exit-code 1 /github/workspace/.webpresso-packed-surface
      - name: Run wp audit guardrails
        # The repo IS webpresso; invoke the in-tree CLI via bun
        # directly rather than relying on a shim, which only exists after
        # `pnpm build` runs chmod-bins + link-self-bins.
        run: bun src/cli/cli.ts audit guardrails
