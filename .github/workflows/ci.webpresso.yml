name: CI (webpresso baseline)

on:
  push:
    branches: [main, master]
  pull_request:

env:
  # Opt the workflow's JavaScript actions into Node.js 24 ahead of the
  # 2026-06-02 GitHub default switch (replaces the deprecation warning
  # surfaced by actions/checkout@v4, actions/setup-node@v4, and
  # pnpm/action-setup@v4 internally running on Node 20).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  check:
    runs-on: ubicloud-standard-2
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r run check-types 2>/dev/null || pnpm -r run typecheck
      - run: pnpm -r run lint

  test:
    runs-on: ubicloud-standard-2
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r run test

  ak-audits:
    runs-on: ubicloud-standard-2
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: |
          which claude && claude install-plugin @webpresso/agent-kit || echo "Claude Code not installed, skipping plugin install"
      - name: Run ak audit guardrails
        run: |
          AK="$(pwd)/node_modules/.bin/ak"
          [ -x "$AK" ] || AK=ak
          "$AK" audit guardrails
