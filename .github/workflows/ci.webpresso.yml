name: CI (webpresso baseline)

on:
  push:
    branches: [main, master]
  pull_request:

# Use the auto-rotated GITHUB_TOKEN for npm.pkg.github.com auth instead of a
# long-lived PAT. Each consuming repo (webpresso/agent-kit) must be granted
# read access to the source packages (@webpresso/stryker-config, etc.) via
# the package's "Manage Actions access" settings on github.com — one-time.
permissions:
  contents: read
  packages: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: pnpm -r run check-types 2>/dev/null || pnpm -r run typecheck 2>/dev/null || true
      - run: pnpm -r run lint 2>/dev/null || true

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: pnpm -r run test

  ak-audits:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          which claude && claude install-plugin @webpresso/agent-kit || echo "Claude Code not installed, skipping plugin install"
          npx ak audit blueprint-lifecycle 2>/dev/null || true
          npx ak audit docs-frontmatter 2>/dev/null || true
          npx ak audit catalog-drift 2>/dev/null || true

  mutation:
    runs-on: ubuntu-latest
    # Mutation testing is expensive — run on main pushes only, not every PR
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Run mutation tests
        run: pnpm test:mutation
        env:
          STRYKER_CONCURRENCY: '4'
