name: CI (webpresso baseline)

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
        env:
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
      - run: pnpm run format:check
      - run: pnpm run lint
      - run: pnpm -r run check-types 2>/dev/null || pnpm -r run typecheck 2>/dev/null || true

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
        env:
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
      - run: pnpm -r run test

  ak-audits:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
        env:
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
      - run: |
          which claude && claude install-plugin @webpresso/agent-kit || echo "Claude Code not installed, skipping plugin install"
          npx ak audit blueprint-lifecycle 2>/dev/null || true
          npx ak audit docs-frontmatter 2>/dev/null || true
          npx ak audit catalog-drift 2>/dev/null || true

  mutation:
    runs-on: ubuntu-latest
    # Mutation testing is expensive — run on main pushes only, not every PR
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
        env:
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
      - name: Run mutation tests
        run: pnpm test:mutation
        env:
          STRYKER_CONCURRENCY: '4'
