name: Bundle smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  # Opt the workflow's JavaScript actions into Node.js 24 ahead of the
  # 2026-06-02 GitHub default switch (replaces the deprecation warning
  # surfaced by actions/checkout@v4, actions/setup-node@v4, and
  # pnpm/action-setup@v4 internally running on Node 20).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  smoke:
    runs-on: ubicloud-standard-2
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: pnpm

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: pnpm install --frozen-lockfile
        env:
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

      - name: Run bundle smoke
        # WP_SKIP_GSTACK and WP_SKIP_RTK skip optional network-dependent
        # scaffolders (git clone / binary download) that require external
        # network access and are not the subject of this smoke test.
        # NO_COLOR=1 suppresses ANSI escape codes in non-TTY output.
        env:
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
          WP_SKIP_GSTACK: '1'
          WP_SKIP_RTK: '1'
          NO_COLOR: '1'
        run: |
          set -euo pipefail

          # The fixture directory is not a git repo; wp setup requires one.
          cd test-fixtures/bundle-smoke
          git init --quiet
          git config user.email "ci@example.com"
          git config user.name "CI"

          # Install agent-kit locally so wp setup can locate its catalog.
          pnpm init --silent 2>/dev/null || true
          pnpm add --silent @webpresso/agent-kit@* 2>/dev/null

          # Run wp setup --yes to avoid TTY prompts. Capture stdout + stderr.
          OUTPUT=$(pnpm exec wp setup --yes 2>&1) || {
            echo "--- wp setup output ---"
            echo "$OUTPUT"
            echo "FAIL: wp setup exited non-zero"
            exit 1
          }

          echo "--- wp setup output ---"
          echo "$OUTPUT"

          # Assert 1: lane-4 framing printed (Task 1.6 requirement)
          echo "$OUTPUT" | grep -qF 'Lane 1 wp_*' || {
            echo "FAIL: lane framing missing — expected 'Lane 1 wp_*' in output"
            exit 1
          }

          # Assert 2: next-steps block printed
          echo "$OUTPUT" | grep -qF 'Setup complete' || {
            echo "FAIL: next-steps missing — expected 'Setup complete' in output"
            exit 1
          }

          # Assert 3: no garbled ANSI (ESC sequences) in non-TTY output.
          # NO_COLOR=1 should suppress the ora spinner; if any ESC byte
          # leaks through, the grep below will catch it.
          if echo "$OUTPUT" | grep -qP '\x1b\['; then
            echo "FAIL: garbled ANSI escape sequences found in non-TTY output"
            echo "$OUTPUT" | grep -P '\x1b\[' | head -5
            exit 1
          fi

          echo "PASS: bundle smoke"
