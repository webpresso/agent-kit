name: session-perf

on:
  pull_request:
    paths:
      - 'src/session-memory/**'
      - 'tests/perf/**'
  push:
    branches: [main, 'feat/ak-session-memory-v2*']

jobs:
  session-perf:
    name: Session memory performance gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '24.16.0'
          cache: pnpm

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

      - name: Run session perf bench
        run: pnpm exec vitest bench tests/perf/session-capture.bench.ts --reporter=verbose
        env:
          AK_SESSION_ENGINE: ctx-rs

      - name: Run with TS fallback (regression comparison)
        run: pnpm exec vitest bench tests/perf/session-capture.bench.ts --reporter=verbose
        env:
          AK_SESSION_ENGINE: ts
