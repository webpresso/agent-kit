name: session-perf

on:
  pull_request:
    paths:
      - 'src/session-memory/**'
      - 'tests/perf/**'
      - '.github/workflows/session-perf.yml'
  push:
    branches: [main, 'feat/ak-session-memory-v2*']

jobs:
  session-perf:
    name: Session memory performance gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: '1.88'

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify vendored ctx-rs source is present
        run: test -f vendor/ctx-rs/Cargo.toml

      - name: Run ctx-rs session perf bench
        run: pnpm exec vitest bench tests/perf/session-capture.bench.ts --reporter=verbose
