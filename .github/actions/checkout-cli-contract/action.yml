name: Checkout CLI contract workspace sibling
description: >
  Materialize the @webpresso/cli-contract workspace package at the absolute
  sibling path expected by pnpm-workspace.yaml while the contract package is
  being released from the Webpresso monorepo.
inputs:
  ref:
    description: Git ref in webpresso/monorepo that contains the CLI contract package.
    required: true
  token:
    description: Token with read access to webpresso/monorepo while @webpresso/cli-contract is unpublished.
    required: true
runs:
  using: composite
  steps:
    - name: Clone webpresso/monorepo
      shell: bash
      run: |
        set -euo pipefail

        workspace_parent="$(dirname "${GITHUB_WORKSPACE}")"
        monorepo_root="${workspace_parent}/monorepo"

        if [ -z "${WEBPRESSO_MONOREPO_TOKEN:-}" ]; then
          echo "::error::A repository read token is required to clone webpresso/monorepo."
          exit 1
        fi

        auth_header="$(printf 'x-access-token:%s' "${WEBPRESSO_MONOREPO_TOKEN}" | base64 | tr -d '\n')"

        rm -rf "${monorepo_root}"
        git \
          -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${auth_header}" \
          clone \
          --depth 1 \
          --branch "${WEBPRESSO_CLI_CONTRACT_REF}" \
          https://github.com/webpresso/monorepo.git \
          "${monorepo_root}"
      env:
        WEBPRESSO_CLI_CONTRACT_REF: ${{ inputs.ref }}
        WEBPRESSO_MONOREPO_TOKEN: ${{ inputs.token }}
