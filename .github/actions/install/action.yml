name: Install (pnpm + node)
description: Set up pnpm, Node 24, restore the pnpm store cache, and run a frozen-lockfile install. Call once per job.

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v6
    - uses: actions/setup-node@v5
      with:
        node-version: '24'
        cache: 'pnpm'
    - shell: bash
      env:
        GH_PACKAGES_TOKEN: ${{ env.GH_PACKAGES_TOKEN }}
      run: pnpm install --frozen-lockfile
